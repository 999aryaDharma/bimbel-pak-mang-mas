<script>
// ============================================================
// HOME
// ============================================================

function renderHome() {
  google.script.run.withSuccessHandler(res => {
    const total = (res && res.success) ? res.total : 0;

    el("konten").innerHTML = `
      <div style="text-align:center; padding:20px; font-family:'Inter',sans-serif;">
        <h1 style="color:#007bff; margin-bottom:5px;">Selamat Datang</h1>
        <p style="color:#666; margin-bottom:30px;">Pilih menu di bawah untuk mengelola data atau memulai modul psikotes.</p>

        <div style="display:flex; justify-content:center; gap:20px; margin-bottom:40px;">
          <div style="background:#fff; padding:20px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.05); width:220px; border-top:4px solid #007bff;">
            <h3 style="margin:0; color:#888; font-size:13px; text-transform:uppercase; letter-spacing:1px;">Total Peserta Terdaftar</h3>
            <div style="font-size:36px; font-weight:bold; color:#1e293b; margin-top:10px;">${total}</div>
          </div>
        </div>

        <div style="display:flex; justify-content:center; gap:15px; flex-wrap:wrap; max-width:1000px; margin:0 auto;">
          ${[
            { menu: "peserta",   label: "Cek Peserta"    },
            { menu: "wartegg",   label: "Input Wartegg"  },
            { menu: "pauli",     label: "Tes Pauli"      },
            { menu: "kraepelin", label: "Tes Kraepelin"  },
            { menu: "htp",       label: "Tes HTP"        },
            { menu: "dashboard", label: "Dashboard"      }
          ].map(item => `
            <div class="menu-box"
                 onclick="loadMenu('${item.menu}')"
                 style="cursor:pointer; padding:25px; background:white; border-radius:15px; border:1px solid #eee; width:170px; transition:0.3s; box-shadow:0 2px 5px rgba(0,0,0,0.02);">
              <span style="font-size:11px; font-weight:800; color:#94a3b8; text-transform:uppercase; display:block; margin-bottom:8px;">${item.menu.toUpperCase()}</span>
              <b style="color:#475569;">${item.label}</b>
            </div>
          `).join("")}
        </div>
      </div>`;
  }).getSemuaPeserta();
}
</script>
