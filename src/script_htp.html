<script>
  // ============================================================
  // HTP (House-Tree-Person)
  // ============================================================

  let htpDataCache = {};

  const HTP_COLORS = {
    Rendah: "#ef4444",
    Cukup: "#f59e0b",
    Baik: "#10b981",
    "Sangat Baik": "#6366f1",
  };

  const HTP_TAHAP_LIST = [
    { id: "orang", label: "TES GAMBAR ORANG" },
    { id: "rumah", label: "TES GAMBAR RUMAH" },
    { id: "pohon", label: "TES GAMBAR POHON" },
    { id: "gabung", label: "TES GABUNGAN (H+T+P)" },
  ];

  const HTP_ASPEK_LIST = [
    { id: "pro",  label: "PRO (Proporsi)"    },
    { id: "detl", label: "DETL (Detail)"     },
    { id: "pers", label: "PERS (Perspektif)" },
    { id: "line", label: "LINE (Garis)"      },
  ];

  // --- Render ---

  function renderHTP() {
    el("konten").innerHTML = `
    <div style="font-family:'Inter',sans-serif; max-width:1100px; margin:auto; padding-bottom:50px;">
      <div style="background:white; padding:35px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.08);">

        <div style="text-align:center; margin-bottom:30px;">
          <h2 style="color:#1e293b; font-weight:700; font-size:26px;">Sistem Penilaian Tes HTP</h2>
          <div style="height:4px; width:60px; background:#10b981; margin:15px auto; border-radius:10px;"></div>
        </div>

        <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; margin-bottom:30px; background:#f8fafc; padding:20px; border-radius:15px; border:1px solid #e2e8f0;">
          <div>
            <label style="font-size:11px; font-weight:700; color:#64748b;">ID PESERTA</label>
            <select id="idPeserta" onchange="updateInfoPeserta()"
                    style="width:100%; padding:10px; border-radius:8px; border:1px solid #cbd5e1;"></select>
          </div>
          <div>
            <label style="font-size:11px; font-weight:700; color:#64748b;">NAMA LENGKAP</label>
            <input type="text" id="nama" readonly style="width:100%; padding:10px; border-radius:8px; border:1px solid #cbd5e1;">
          </div>
          <div>
            <label style="font-size:11px; font-weight:700; color:#64748b;">ID TEST</label>
            <input type="text" id="id_test_htp" readonly style="width:100%; padding:10px; border-radius:8px; border:1px solid #cbd5e1;">
          </div>
          <div>
            <label style="font-size:11px; font-weight:700; color:#64748b;">TANGGAL TEST</label>
            <input type="text" id="tgl_test" readonly style="width:100%; padding:10px; border-radius:8px; border:1px solid #cbd5e1;">
          </div>
        </div>

        ${HTP_TAHAP_LIST.map((tahap) => _buildTahapPanel(tahap)).join("")}

        ${_buildRekap()}
      </div>
    </div>`;

    htpDataCache = {};
    loadDropdown();
    google.script.run
      .withSuccessHandler(function(id) {
        el("id_test_htp").value = id;
      })
      .generateIdTest("HTP");
    el("tgl_test").value = todayString();
  }

  function _buildTahapPanel(tahap) {
    return `
    <div style="margin-bottom:40px; border:1px solid #f1f5f9; border-radius:15px; padding:25px; background:#fff;">
      <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #f1f5f9; padding-bottom:10px; margin-bottom:20px;">
        <h3 style="color:#334155; font-size:18px; font-weight:700; margin:0;">${tahap.label}</h3>
        <div style="display:flex; gap:15px;">
          <div style="text-align:right;">
            <span style="font-size:9px; font-weight:800; color:#94a3b8; display:block;">JUMLAH SCORE</span>
            <input type="text" id="total_score_${tahap.id}" readonly value="0"
                   style="width:50px; border:none; background:transparent; font-size:18px; font-weight:800; color:#6366f1; text-align:right; outline:none;">
          </div>
          <div style="text-align:right; border-left:2px solid #f1f5f9; padding-left:15px;">
            <span style="font-size:9px; font-weight:800; color:#94a3b8; display:block;">KATEGORI</span>
            <input type="text" id="kategori_${tahap.id}" readonly value="-"
                   style="width:80px; border:none; background:transparent; font-size:18px; font-weight:800; color:#10b981; text-align:right; outline:none;">
          </div>
        </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 2fr; gap:25px;">
        <div>
          <label style="font-size:12px; font-weight:700; color:#475569; display:block; margin-bottom:8px;">
            UPLOAD GAMBAR ${tahap.id.toUpperCase()}
          </label>
          <input type="file" id="file_${tahap.id}" accept="image/*"
                 onchange="handlePreview(this,'${tahap.id}')" style="width:100%; margin:8px 0;">
          <button id="btn_ai_${tahap.id}" onclick="jalankanAI_HTP('${tahap.id}')"
                  style="background:#6366f1; color:white; border:none; width:100%; padding:12px; border-radius:10px; font-weight:600; cursor:pointer; margin-top:8px;">
            Analisa AI ${tahap.id}
          </button>
          <div id="preview_${tahap.id}" style="margin-top:15px; text-align:center;"></div>
        </div>

        <div>
          <label style="font-size:12px; font-weight:800; color:#1e293b; display:block; margin-bottom:10px;">
            ANALISA HASIL SCORE
          </label>
          <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:10px;">
            ${HTP_ASPEK_LIST.map((aspek) => `
              <div>
                <label style="font-size:10px; font-weight:700; color:#94a3b8;">${aspek.label}</label>
                <input type="number" id="skor_${tahap.id}_${aspek.id}" value="0" min="1" max="5"
                       oninput="hitungTotalPerTahap('${tahap.id}')"
                       style="width:100%; padding:10px; border-radius:8px; border:1px solid #e2e8f0; text-align:center; font-weight:700;">
              </div>`).join("")}
          </div>
          <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:10px;">
            ${HTP_ASPEK_LIST.map((aspek) => `
              <div>
                <label style="font-size:9px; font-weight:700; color:#64748b;">NARASI ${aspek.label}</label>
                <textarea id="narasi_detail_${tahap.id}_${aspek.id}"
                          style="width:100%; height:50px; padding:8px; border-radius:6px; border:1px solid #e2e8f0; font-size:11px; resize:none;"></textarea>
              </div>`).join("")}
          </div>
        </div>
      </div>

      <div style="margin-top:25px; border-top:1px solid #f1f5f9; padding-top:15px;">
        <label style="font-size:12px; font-weight:800; color:#1e293b; display:block; margin-bottom:15px;">
          HASIL ANALISA KESIMPULAN SCORE
        </label>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
          ${["teknis", "konten", "simbolis", "observasi"].map((f) => `
            <div>
              <label style="font-size:11px; font-weight:700;">ANALISA ${f.toUpperCase()}</label>
              <textarea id="${f}_${tahap.id}"
                        style="width:100%; height:60px; padding:10px; border-radius:8px; border:1px solid #e2e8f0;"></textarea>
            </div>`).join("")}
        </div>
      </div>
    </div>`;
  }

  function _buildRekap() {
    return `
    <div style="margin-top:40px; border-top:3px double #e2e8f0; padding-top:30px;">
      <div style="text-align:center; margin-bottom:30px;">
        <h3 style="color:#1e293b; font-weight:800; font-size:22px;">HASIL ANALISA KESIMPULAN TEST</h3>
        <div style="height:4px; width:80px; background:#6366f1; margin:10px auto; border-radius:10px;"></div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:30px; background:#f8fafc; padding:20px; border-radius:15px; border:2px solid #e2e8f0;">
        <div style="text-align:center;">
          <span style="font-size:12px; font-weight:800; color:#64748b; display:block; margin-bottom:5px;">TOTAL SCORE KESELURUHAN</span>
          <input type="text" id="total_keseluruhan" readonly value="0"
                 style="border:none; background:transparent; font-size:32px; font-weight:900; text-align:center; width:100%; outline:none;">
        </div>
        <div style="text-align:center;">
          <span style="font-size:12px; font-weight:800; color:#64748b; display:block; margin-bottom:5px;">KATEGORI AKHIR</span>
          <input type="text" id="kategori_keseluruhan" readonly value="-"
                 style="border:none; background:transparent; font-size:32px; font-weight:900; text-align:center; width:100%; color:#10b981; outline:none;">
        </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
        ${[
          { id: "final_teknis",       label: "Aspek Teknis" },
          { id: "final_interpretasi", label: "Interpretasi Objek Konten" },
          { id: "final_dinamika",     label: "Dinamika Psikologis" },
          { id: "final_profil",       label: "Profil Perilaku & Rekomendasi" },
        ].map((item) => `
          <div>
            <label style="font-weight:700; margin-bottom:8px; display:block; color:#334155;">${item.label}</label>
            <textarea id="${item.id}"
                      style="width:100%; height:120px; border-radius:12px; border:1px solid #cbd5e1; padding:15px;"></textarea>
          </div>`).join("")}
      </div>

      <button onclick="simpanHTP()"
              style="background:#10b981; color:white; width:100%; padding:20px; border:none; border-radius:15px; font-weight:800; font-size:18px; margin-top:30px; cursor:pointer;">
        Simpan dan Cetak Laporan PDF (HTP)
      </button>

      <div id="pdfPreviewHTP" style="display:none; margin-top:30px;">
        <iframe id="frameLaporanHTP" src=""
                style="width:100%; height:600px; border:1px solid #e2e8f0; border-radius:12px;"></iframe>
      </div>
    </div>`;
  }

  // --- AI & Perhitungan ---

  function handlePreview(input, tahapId) {
    if (!input.files[0]) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      el("preview_" + tahapId).innerHTML =
        '<img src="' + e.target.result + '" style="max-width:100%; border-radius:10px; border:2px solid #6366f1; margin-top:10px;">';
      const btn = el("btn_ai_" + tahapId);
      if (btn) { btn.disabled = false; btn.style.background = "#6366f1"; }
    };
    reader.readAsDataURL(input.files[0]);
  }

  function jalankanAI_HTP(tahapId) {
    const btn     = el("btn_ai_" + tahapId);
    const preview = document.querySelector("#preview_" + tahapId + " img");
    if (!preview) { alert("Upload gambar terlebih dahulu!"); return; }

    if (btn) { btn.innerHTML = "Memproses..."; btn.disabled = true; btn.style.background = "#94a3b8"; }

    google.script.run
      .withSuccessHandler(function(res) {
        if (res.error) {
          alert("Error: " + res.error);
          if (btn) { btn.innerHTML = "Gagal"; btn.disabled = false; }
          return;
        }
        htpDataCache[tahapId] = res.db_referensi || null;

        HTP_ASPEK_LIST.forEach(function(aspek) {
          const elSkor   = el("skor_"          + tahapId + "_" + aspek.id);
          const elNarasi = el("narasi_detail_" + tahapId + "_" + aspek.id);
          if (elSkor)   elSkor.value   = res.skor[aspek.id]   || 0;
          if (elNarasi) elNarasi.value = res.narasi[aspek.id] || "";
        });

        hitungTotalPerTahap(tahapId);
        if (btn) { btn.innerHTML = "Sudah Dianalisa"; btn.style.background = "#10b981"; btn.disabled = false; }
      })
      .withFailureHandler(function(err) {
        console.error("Server error:", err);
        if (btn) { btn.innerHTML = "Error Server"; btn.disabled = false; }
      })
      .panggilAI_HTP(preview.src, tahapId);
  }

  function hitungTotalPerTahap(tahapId) {
    let total = 0;
    HTP_ASPEK_LIST.forEach(function(aspek) {
      const elSkor   = el("skor_"          + tahapId + "_" + aspek.id);
      const elNarasi = el("narasi_detail_" + tahapId + "_" + aspek.id);
      if (!elSkor) return;

      let nilai = parseInt(elSkor.value) || 0;
      if (nilai > 5) { nilai = 5; elSkor.value = 5; }
      total += nilai;

      if (elNarasi) {
        const cache = htpDataCache[tahapId];
        const teks  = cache && cache.narasi && cache.narasi[aspek.id]
          ? cache.narasi[aspek.id][String(nilai)] || "" : "";
        if (teks) elNarasi.value = teks;
      }
    });

    const kategori = getKategoriHTP(total);
    const elTotal  = el("total_score_" + tahapId);
    const elKat    = el("kategori_"    + tahapId);
    if (elTotal) elTotal.value = total;
    if (elKat)   { elKat.value = kategori; elKat.style.color = HTP_COLORS[kategori] || "#1e293b"; }

    const cache      = htpDataCache[tahapId];
    const kesimpulan = cache && cache.kesimpulan && cache.kesimpulan[kategori]
      ? cache.kesimpulan[kategori]
      : { teknis: "-", konten: "-", simbolis: "-", observasi: "-" };

    ["teknis", "konten", "simbolis", "observasi"].forEach(function(f) {
      const elF = el(f + "_" + tahapId);
      if (elF) elF.value = kesimpulan[f] || "-";
    });

    hitungTotalKeseluruhan();
  }

  function hitungTotalKeseluruhan() {
    let grand = 0;
    HTP_TAHAP_LIST.forEach(function(t) {
      grand += parseInt((el("total_score_" + t.id) || {}).value) || 0;
    });

    const elGrand = el("total_keseluruhan");
    if (elGrand) elGrand.value = grand;

    const kategori = grand >= 60 ? "Sangat Baik"
                   : grand >= 40 ? "Baik"
                   : grand >= 20 ? "Cukup" : "Rendah";
    const elKat = el("kategori_keseluruhan");
    if (elKat) { elKat.value = kategori; elKat.style.color = HTP_COLORS[kategori]; }

    _isiNarasiFinal(kategori);
  }

  function _isiNarasiFinal(kategori) {
    const db = {
      "Sangat Baik": {
        t: "Struktur gambar terpadu dengan sangat baik. Garis tegas mencerminkan kepercayaan diri yang konsisten.",
        i: "Penyajian elemen lengkap menunjukkan subjek memiliki wawasan luas dan perhatian tulus.",
        d: "Mencerminkan keharmonisan antara aspirasi pribadi dengan realitas sosial yang matang.",
        p: "Menunjukkan stabilitas kerja dan kemampuan adaptasi yang sangat prima.",
      },
      Baik: {
        t: "Goresan garis bersih dan teratur. Koordinasi visual-motorik menunjukkan kontrol diri yang stabil.",
        i: "Penyajian konten komprehensif, mencerminkan pemahaman realitas yang sehat dan fokus.",
        d: "Stabilitas emosi terjaga dengan baik, mampu menyesuaikan diri secara produktif.",
        p: "Subjek kooperatif dan memiliki potensi besar untuk berkembang dalam tim.",
      },
      Cukup: {
        t: "Terdapat sedikit keraguan dalam tarikan garis, namun struktur utama tetap terjaga.",
        i: "Objek utama dikenali dengan baik meskipun beberapa detail pendukung kurang diperhatikan.",
        d: "Kontrol emosi rata-rata dengan kecenderungan bersikap hati-hati dalam interaksi.",
        p: "Memerlukan bimbingan rutin untuk meningkatkan ketelitian dan kepercayaan diri.",
      },
      Rendah: {
        t: "Goresan garis tampak ragu atau terputus, mengindikasikan hambatan pada rasa percaya diri.",
        i: "Penggambaran objek minimalis, mencerminkan kurangnya minat atau energi psikis.",
        d: "Ditemukan tanda-tanda kecemasan signifikan atau hambatan penyesuaian diri.",
        p: "Memerlukan pendampingan intensif untuk meningkatkan motivasi dan keberanian diri.",
      },
    };
    const data     = db[kategori] || db["Cukup"];
    const fieldMap = [
      ["final_teknis",       "t"],
      ["final_interpretasi", "i"],
      ["final_dinamika",     "d"],
      ["final_profil",       "p"],
    ];
    fieldMap.forEach(function(pair) {
      const elF = el(pair[0]);
      if (elF) elF.value = data[pair[1]];
    });
  }

  // --- Simpan ---
  // Serial upload (satu per satu) - sama seperti kondisi yang berhasil 18 April

  async function simpanHTP() {
    if (!document.getElementById("idPeserta").value) {
      alert("Pilih peserta terlebih dahulu!");
      return;
    }

    Swal.fire({
      title: "Menyiapkan Data & Membaca Gambar...",
      allowOutsideClick: false,
      didOpen: () => Swal.showLoading()
    });

    const tahapanGambar = ["orang", "rumah", "pohon", "gabung"];
    const uploadResults = {};

    const namaSiswa = document.getElementById("nama").value.trim().replace(/\s+/g, "_") || "Peserta";

    // Upload serial satu per satu - seperti yang terbukti berhasil
    for (const tahap of tahapanGambar) {
      const fileInput = document.getElementById("file_" + tahap);
      if (fileInput && fileInput.files && fileInput.files.length > 0) {
        const base64 = await new Promise(function(resolve) {
          const reader   = new FileReader();
          reader.onload  = function() { resolve(reader.result); };
          reader.onerror = function() { resolve(""); };
          reader.readAsDataURL(fileInput.files[0]);
        });

        // Nama file pakai timestamp - format yang terbukti berhasil: rumah_1776487733063.jpg
        const namaFile  = tahap + "_" + namaSiswa + ".jpg";

        const result = await new Promise(function(resolve) {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(function() { resolve({ success: false, url: "-" }); })
            .uploadGambarSaja(base64, namaFile, "HTP");
        });

        uploadResults[tahap] = result.url || "-";
      } else {
        uploadResults[tahap] = "-";
      }
    }

    Swal.fire({
      title: "Menyimpan ke Google Sheet & Membuat PDF...",
      allowOutsideClick: false,
      didOpen: () => Swal.showLoading()
    });

    const payload = _buildPayloadHTP(uploadResults);

    google.script.run
      .withSuccessHandler(function(res) {
        Swal.close();
        if (res.success) {
          Swal.fire("Berhasil", res.message || "Data berhasil disimpan.", "success").then(function() {
            if (res.pdfUrl) {
              const previewDiv = document.getElementById("pdfPreviewHTP");
              if (previewDiv) previewDiv.style.display = "block";
              const frame = document.getElementById("frameLaporanHTP");
              if (frame) frame.src = res.pdfUrl.replace("/view?usp=drivesdk", "/preview");
            }
          });
        } else {
          Swal.fire("Gagal Menyimpan", res.message || "Terjadi kesalahan.", "error");
        }
      })
      .withFailureHandler(function(err) {
        Swal.close();
        Swal.fire("Error Server", err.message, "error");
      })
      .simpanHTP(payload);
  }

  function _buildPayloadHTP(uploadResults) {
    const tahapanList = ["orang", "rumah", "pohon", "gabung"];
    const aspekList   = ["pro", "detl", "pers", "line"];

    const payload = {
      id_test:              document.getElementById("id_test_htp").value,
      id_peserta:           document.getElementById("idPeserta").value,
      nama:                 document.getElementById("nama").value,
      tanggal:              document.getElementById("tgl_test").value,
      total_keseluruhan:    document.getElementById("total_keseluruhan").value,
      kategori_keseluruhan: document.getElementById("kategori_keseluruhan").value,
      final_teknis:         document.getElementById("final_teknis").value,
      final_interpretasi:   document.getElementById("final_interpretasi").value,
      final_dinamika:       document.getElementById("final_dinamika").value,
      final_profil:         document.getElementById("final_profil").value,
      image_orang:   uploadResults["orang"]  || "-",
      image_rumah:   uploadResults["rumah"]  || "-",
      image_pohon:   uploadResults["pohon"]  || "-",
      image_gabung:  uploadResults["gabung"] || "-",
    };

    tahapanList.forEach(function(tahap) {
      aspekList.forEach(function(aspek) {
        const elSkor   = document.getElementById("skor_"          + tahap + "_" + aspek);
        const elNarasi = document.getElementById("narasi_detail_" + tahap + "_" + aspek);
        payload["skor_"          + tahap + "_" + aspek] = elSkor   ? elSkor.value   : 0;
        payload["narasi_detail_" + tahap + "_" + aspek] = elNarasi ? elNarasi.value : "";
      });

      payload["total_"     + tahap] = (document.getElementById("total_score_" + tahap) || {}).value || 0;
      payload["kategori_"  + tahap] = (document.getElementById("kategori_"    + tahap) || {}).value || "-";
      payload["teknis_"    + tahap] = (document.getElementById("teknis_"      + tahap) || {}).value || "";
      payload["konten_"    + tahap] = (document.getElementById("konten_"      + tahap) || {}).value || "";
      payload["simbolis_"  + tahap] = (document.getElementById("simbolis_"    + tahap) || {}).value || "";
      payload["observasi_" + tahap] = (document.getElementById("observasi_"   + tahap) || {}).value || "";
    });

    return payload;
  }
</script>
