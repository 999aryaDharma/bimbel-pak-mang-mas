const el = (id) => document.getElementById(id);

function loadMenu(pilihan) {
  el("konten").innerHTML = '<div class="loading">Menyiapkan halaman...</div>';

  // Gunakan if-else agar tiap fungsi di-resolve satu per satu saat dipanggil.
  // Object map { key: fnRef } akan crash diam-diam jika salah satu fungsi belum terdefinisi.
  try {
    if      (pilihan === 'home')       renderHome();
    else if (pilihan === 'peserta')    renderPeserta();
    else if (pilihan === 'wartegg')    renderWartegg();
    else if (pilihan === 'htp')        renderHTP();
    else if (pilihan === 'pauli')      renderPauli();
    else if (pilihan === 'kraepelin')  renderKraepelin();
    else if (pilihan === 'dashboard')  renderDashboard();
    else {
      el("konten").innerHTML = `<p style="color:#dc3545;">Menu '<b>${pilihan}</b>' tidak ditemukan.</p>`;
    }
  } catch (e) {
    // Tampilkan error di layar agar mudah di-debug, bukan silent fail.
    el("konten").innerHTML = `
      <div style="background:#fff1f2; border:1px solid #fecdd3; padding:20px; border-radius:10px; font-family:monospace;">
        <b style="color:#dc3545;">Error saat membuka menu '${pilihan}':</b><br><br>
        ${e.message}<br><br>
        <small style="color:#64748b; white-space:pre-wrap;">${e.stack || ''}</small>
      </div>`;
  }
}

window.onload = () => loadMenu("home");

// --- Shared Helpers ---

function loadDropdown() {
  google.script.run.withSuccessHandler(data => {
    const selects = document.querySelectorAll("select#idPeserta");
    const html = '<option value="">-- Pilih Peserta --</option>'
      + data.map(p => `<option value="${p.id}" data-nama="${p.nama}">${p.id} - ${p.nama}</option>`).join("");
    selects.forEach(s => { s.innerHTML = html; });
  }).getPesertaDropdown();
}

function updateInfoPeserta() {
  const sel = el("idPeserta");
  if (!sel) return;
  const opt = sel.options[sel.selectedIndex];
  const namaEl = el("nama");
  if (namaEl) namaEl.value = opt.getAttribute("data-nama") || "";
}

function todayString() {
  return new Date().toLocaleDateString("id-ID");
}

// --- Kategori Helpers (dipakai lintas modul) ---

function getKategoriWartegg(total) {
  if (total <= 16) return "Rendah";
  if (total <= 24) return "Cukup";
  if (total <= 32) return "Baik";
  return "Sangat Baik";
}

function getKategoriHTP(total) {
  if (total >= 17) return "Sangat Baik";
  if (total >= 13) return "Baik";
  if (total >= 9)  return "Cukup";
  return "Rendah";
}
