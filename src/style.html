<style>
  :root {
    --blue:   #2c7be5;
    --green:  #28a745;
    --red:    #dc3545;
    --indigo: #6366f1;
    --gray:   #f8fafc;
    --border: #e2e8f0;
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--gray);
    margin: 0;
    padding: 20px;
    color: #333;
  }

  .container { max-width: 1100px; margin: auto; }

  /* Header */
  .header { text-align: center; margin-bottom: 25px; }
  .header h1 { color: var(--blue); margin: 0; font-size: 20px; }

  /* Navigation */
  .menu {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 25px;
  }
  .menu button {
    background: var(--blue);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
    font-weight: 500;
    font-size: 14px;
  }
  .menu button:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(44, 123, 229, 0.3);
  }

  /* Content Card */
  .card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    min-height: 400px;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 15px 0 5px;
    color: #94a3b8;
    font-size: 13px;
  }

  /* Form Elements */
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin-bottom: 20px;
  }
  .input-box { display: flex; flex-direction: column; }
  label { font-weight: 600; margin-bottom: 5px; font-size: 13px; }
  input, select, textarea {
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--indigo);
  }
  textarea { resize: vertical; min-height: 80px; width: 100%; }

  /* Save Button */
  .btn-save {
    background: var(--green);
    color: white;
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    width: 100%;
    margin-top: 20px;
    font-size: 15px;
  }
  .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

  /* Loading */
  .loading { text-align: center; padding: 50px; color: #94a3b8; }

  /* Home menu boxes hover effect */
  .menu-box:hover {
    transform: translateY(-5px);
    border-color: var(--blue) !important;
    box-shadow: 0 10px 20px rgba(44, 123, 229, 0.1) !important;
  }
</style>
