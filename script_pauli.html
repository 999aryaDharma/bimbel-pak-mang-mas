<script>
// ============================================================
// PAULI
// ============================================================

const PAULI_ASPEK_LIST = [
  { id: "kapasitas",  label: "ASPEK 1: KAPASITAS KERJA"                  },
  { id: "ketelitian", label: "ASPEK 2: KETELITIAN & KONSENTRASI"         },
  { id: "stabilitas", label: "ASPEK 3: STABILITAS & PENGENDALIAN EMOSI"  },
  { id: "kurva",      label: "ASPEK 4: GRAFIK & KURVA BELAJAR"           }
];

function renderPauli() {
  const lajurInputs = Array.from({ length: 20 }, (_, i) => i + 1).map(n => `
    <div style="text-align:center;">
      <label style="font-size:10px; font-weight:800; color:#94a3b8; display:block; margin-bottom:3px;">L-${n}</label>
      <input type="number" id="lajur_${n}" value="0" oninput="hitungOtomatisPauli()"
             style="width:100%; padding:8px; border-radius:8px; border:1px solid #e2e8f0; text-align:center; font-weight:700;">
    </div>`).join("");

  const paramInputs = [
    { id: "total_n",      label: "TOTAL DIKERJAKAN (N)", ro: true  },
    { id: "total_salah",  label: "TOTAL SALAH (S)",      ro: false },
    { id: "total_loncat", label: "TOTAL LONCATAN (L)",   ro: false },
    { id: "total_betul",  label: "PEMBETULAN (P)",       ro: false }
  ].map(p => `
    <div style="margin-bottom:12px;">
      <label style="font-size:11px; font-weight:700;">${p.label}</label>
      <input type="number" id="${p.id}" value="0"
             ${p.ro ? "readonly" : 'oninput="hitungOtomatisPauli()"'}
             style="width:100%; padding:10px; border-radius:8px; border:1px solid #fcd34d; font-weight:700; background:#fff;">
    </div>`).join("");

  const scoreCards = [
    { id: "score_total",        label: "JUMLAH KESELURUHAN",   bg: "#f8fafc", bd: "#e2e8f0", color: ""        },
    { id: "score_salah_persen", label: "KESALAHAN (SALAH %)",  bg: "#fff1f2", bd: "#fecdd3", color: "#9f1239" },
    { id: "score_pembetulan",   label: "PEMBETULAN",           bg: "#f0fdf4", bd: "#bbf7d0", color: "#14532d" },
    { id: "score_puncak",       label: "TINGGI (PUNCAK)",      bg: "#eff6ff", bd: "#bfdbfe", color: "#1e3a8a" },
    { id: "score_terendah",     label: "TITIK TERENDAH",       bg: "#f1f5f9", bd: "#cbd5e1", color: ""        },
    { id: "score_simpangan",    label: "SIMPANGAN (FLUKTUASI)",bg: "#fff7ed", bd: "#fed7aa", color: "#7c2d12" }
  ].map(s => `
    <div style="background:${s.bg}; padding:15px; border-radius:12px; border:1px solid ${s.bd};">
      <label style="font-size:10px; font-weight:800; color:#64748b; display:block;">${s.label}</label>
      <input type="text" id="${s.id}" readonly value="0"
             style="width:100%; border:none; background:transparent; font-size:20px; font-weight:800; ${s.color ? "color:" + s.color : ""}">
    </div>`).join("");

  const aspekPanels = PAULI_ASPEK_LIST.map(aspek => `
    <div style="background:#fff; border:1px solid #f1f5f9; border-radius:20px; padding:22px; border-left:5px solid #3b82f6;">
      <span style="font-size:13px; font-weight:800; color:#1e293b; display:block; margin-bottom:12px;">${aspek.label}</span>
      <textarea id="narasi_${aspek.id}" readonly
                style="width:100%; height:85px; border-radius:12px; border:1px solid #f1f5f9; padding:12px; font-size:12px; resize:none; background:#fafafa;"></textarea>
    </div>`).join("");

  el("konten").innerHTML = `
    <div style="font-family:'Inter',sans-serif; max-width:1200px; margin:auto; padding-bottom:60px;">
      <div style="background:#fff; padding:40px; border-radius:24px; box-shadow:0 15px 50px rgba(0,0,0,0.1);">

        <div style="text-align:center; margin-bottom:30px;">
          <h2 style="color:#1e293b; font-weight:800; font-size:28px;">Digital Work Curve: Tes Pauli Professional</h2>
          <div style="height:4px; width:80px; background:linear-gradient(90deg,#3b82f6,#10b981); margin:15px auto; border-radius:10px;"></div>
        </div>

        <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; margin-bottom:35px; background:#f8fafc; padding:25px; border-radius:18px; border:1px solid #e2e8f0;">
          <div>
            <label style="font-size:11px; font-weight:700; color:#64748b; display:block; margin-bottom:5px;">ID PESERTA</label>
            <select id="idPeserta" onchange="updateInfoPeserta()"
                    style="width:100%; padding:12px; border-radius:10px; border:1px solid #cbd5e1; font-weight:600;"></select>
          </div>
          <div>
            <label style="font-size:11px; font-weight:700; color:#64748b; display:block; margin-bottom:5px;">NAMA LENGKAP</label>
            <input type="text" id="nama" readonly style="width:100%; padding:12px; border-radius:10px; border:1px solid #cbd5e1; font-weight:600;">
          </div>
          <div>
            <label style="font-size:11px; font-weight:700; color:#64748b; display:block; margin-bottom:5px;">ID TEST</label>
            <input type="text" id="id_test_pauli" readonly style="width:100%; padding:12px; border-radius:10px; border:1px solid #cbd5e1;">
          </div>
          <div>
            <label style="font-size:11px; font-weight:700; color:#64748b; display:block; margin-bottom:5px;">TANGGAL</label>
            <input type="text" id="tgl_test" readonly style="width:100%; padding:12px; border-radius:10px; border:1px solid #cbd5e1;">
          </div>
        </div>

        <div style="margin-bottom:35px; border:2px dashed #3b82f6; border-radius:20px; padding:30px; text-align:center; background:#eff6ff;">
          <h4 style="font-size:16px; font-weight:800; color:#1e40af; margin-bottom:15px;">AI VISION SCANNER (OCR ENGINE)</h4>
          <input type="file" id="file_pauli" accept="image/*" onchange="previewImagePauli(this)" style="margin-bottom:15px; font-size:13px;">
          <div id="preview_container_pauli" style="margin-top:10px; display:none;">
            <img id="img_preview_pauli" src="#" style="max-width:100%; max-height:300px; border-radius:12px; border:2px solid #fff;">
          </div>
          <br>
          <button onclick="jalankanAI_Pauli()"
                  style="background:#3b82f6; color:white; border:none; padding:15px 40px; border-radius:12px; font-weight:800; cursor:pointer; margin-top:10px;">
            Ekstrak Data Lajur via AI
          </button>
        </div>

        <div style="margin-bottom:30px; background:#f8fafc; padding:20px; border-radius:15px; border:1px solid #cbd5e1;">
          <label style="font-weight:800; color:#1e293b; display:block; margin-bottom:10px; font-size:14px;">Log Pengamatan AI</label>
          <textarea id="log_pengamatan_ai" readonly placeholder="Proses perhitungan AI akan muncul di sini..."
                    style="width:100%; height:120px; border-radius:10px; border:1px solid #e2e8f0; padding:15px; font-size:12px; background:#fff; color:#475569; font-family:monospace; resize:vertical;"></textarea>
        </div>

        <div style="display:grid; grid-template-columns:1fr 350px; gap:25px; margin-bottom:35px;">
          <div style="background:#fff; border:1px solid #e2e8f0; border-radius:20px; padding:25px;">
            <h3 style="color:#334155; font-size:16px; font-weight:800; margin-bottom:20px;">DATA PENJUMLAHAN (20 LAJUR)</h3>
            <div style="display:grid; grid-template-columns:repeat(10,1fr); gap:10px; margin-bottom:25px;">${lajurInputs}</div>
            <h4 style="font-size:13px; font-weight:800; color:#64748b; margin-bottom:15px; border-top:1px solid #eee; padding-top:15px;">Grafik Kurva Kerja</h4>
            <div id="chart_pauli_mini"
                 style="height:150px; width:100%; background:#fcfcfc; border-radius:12px; border:1px solid #f1f5f9; display:flex; align-items:flex-end; justify-content:space-around; padding:15px;"></div>
          </div>
          <div style="background:#fffbeb; padding:25px; border-radius:20px; border:1px solid #fde68a;">
            <h4 style="font-size:14px; font-weight:800; color:#b45309; margin-bottom:15px;">PARAMETER KUALITAS</h4>
            ${paramInputs}
          </div>
        </div>

        <div style="margin-bottom:40px; border-top:1px solid #eee; padding-top:30px;">
          <h3 style="color:#1e293b; font-size:18px; font-weight:800; margin-bottom:20px;">PARAMETER PENILAIAN (SCORING)</h3>
          <div style="background:linear-gradient(135deg,#1e293b,#334155); padding:25px; border-radius:20px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; color:white;">
            <label style="font-size:12px; font-weight:800; color:#94a3b8;">FINAL PERFORMANCE SCORE</label>
            <input type="text" id="final_score_angka" readonly value="0.00"
                   style="width:180px; border:none; background:transparent; font-size:48px; font-weight:900; color:#3b82f6; text-align:right; outline:none;">
          </div>
          <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:15px;">${scoreCards}</div>
        </div>

        <div style="margin-top:40px; border-top:2px solid #f1f5f9; padding-top:30px;">
          <h3 style="color:#1e293b; font-size:18px; font-weight:800; margin-bottom:25px; text-align:center;">HASIL ANALISA ASPEK PSIKOLOGI</h3>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">${aspekPanels}</div>
        </div>

        <div style="border-top:3px double #f1f5f9; padding-top:40px; margin-top:40px;">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:30px;">
            <div style="background:#f0fdf4; padding:25px; border-radius:20px; text-align:center; border:2px solid #bbf7d0;">
              <label style="font-size:11px; font-weight:800; color:#166534; display:block; margin-bottom:8px;">KATEGORI TES</label>
              <div id="hasil_kategori_final" style="font-size:28px; font-weight:900; color:#15803d;">-</div>
            </div>
            <div style="background:#eff6ff; padding:25px; border-radius:20px; text-align:center; border:2px solid #bfdbfe;">
              <label style="font-size:11px; font-weight:800; color:#1e40af; display:block; margin-bottom:8px;">REKOMENDASI JABATAN</label>
              <div id="hasil_rekomendasi_final" style="font-size:18px; font-weight:900; color:#1e3a8a;">-</div>
            </div>
          </div>
          <div style="margin-bottom:30px;">
            <label style="font-weight:800; display:block; margin-bottom:10px; font-size:14px;">Analisa Psikologi Keseluruhan</label>
            <textarea id="analisa_keseluruhan"
                      style="width:100%; height:150px; border-radius:18px; border:1px solid #e2e8f0; padding:20px; font-size:13px; background:#f9fafb;"></textarea>
          </div>
          <button onclick="simpanPauli()"
                  style="background:#10b981; color:white; padding:20px; border:none; border-radius:15px; font-weight:800; font-size:16px; cursor:pointer; width:100%;">
            Simpan Data Tes
          </button>
        </div>

      </div>
    </div>`;

  loadDropdown();
  google.script.run.withSuccessHandler(id => { el("id_test_pauli").value = id; }).generateIdTest("PAULI");
  el("tgl_test").value = todayString();
}

function previewImagePauli(input) {
  const container = el("preview_container_pauli");
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      el("img_preview_pauli").src = e.target.result;
      container.style.display = "block";
    };
    reader.readAsDataURL(input.files[0]);
  } else {
    container.style.display = "none";
  }
}

function jalankanAI_Pauli() {
  const file = el("file_pauli").files[0];
  if (!file) { Swal.fire("Perhatian", "Pilih gambar hasil tes dulu", "warning"); return; }

  Swal.fire({ title: "AI Memindai Lembar Kerja", text: "Menganalisa...", allowOutsideClick: false, didOpen: () => Swal.showLoading() });

  const reader = new FileReader();
  reader.onload = e => {
    const base64 = e.target.result.split(",")[1];

    google.script.run
      .withFailureHandler(err => { Swal.close(); Swal.fire("Error Koneksi", err.message, "error"); })
      .withSuccessHandler(res => {
        Swal.close();
        if (typeof res === "string") { try { res = JSON.parse(res); } catch (e) {} }
        if (res.error) { Swal.fire("Gagal", res.error, "error"); return; }

        const logEl = el("log_pengamatan_ai");
        if (logEl) {
          logEl.value = res.log_pengamatan
            || "AI tidak mengirimkan log.\n\nData mentah:\n" + JSON.stringify(res, null, 2);
        }

        (res.lajur || []).forEach((v, i) => {
          const inp = el("lajur_" + (i + 1));
          if (inp) inp.value = v;
        });

        el("total_salah").value  = res.total_salah  || 0;
        el("total_loncat").value = res.total_loncat || 0;
        el("total_betul").value  = res.total_betul  || 0;

        PAULI_ASPEK_LIST.forEach(aspek => {
          const narEl = el("narasi_" + aspek.id);
          if (narEl) narEl.value = res["narasi_" + aspek.id] || "";
        });
        el("analisa_keseluruhan").value = res.analisa_global || "";

        hitungOtomatisPauli();
        Swal.fire("Selesai", "Data telah dimuat. Periksa Log Pengamatan.", "success");
      })
      .pauliJembatanAI(base64);
  };
  reader.readAsDataURL(file);
}

function hitungOtomatisPauli() {
  const vals = Array.from({ length: 20 }, (_, i) => parseInt(el("lajur_" + (i + 1)).value) || 0);

  const n          = vals.reduce((a, b) => a + b, 0);
  const s          = parseInt(el("total_salah").value) || 0;
  const finalScore = n - s;
  const persen     = n > 0 ? ((s / n) * 100).toFixed(2) : 0;
  const puncak     = Math.max(...vals);
  const positif    = vals.filter(v => v > 0);
  const terendah   = positif.length > 0 ? Math.min(...positif) : 0;

  el("total_n").value            = n;
  el("score_total").value        = n;
  el("final_score_angka").value  = finalScore.toFixed(2);
  el("score_salah_persen").value = persen + "%";
  el("score_pembetulan").value   = el("total_betul").value || 0;
  el("score_puncak").value       = puncak;
  el("score_terendah").value     = terendah;
  el("score_simpangan").value    = puncak - terendah;

  const kategori = finalScore > 300 ? "SANGAT BAIK" : finalScore > 200 ? "BAIK" : "CUKUP";
  el("hasil_kategori_final").innerText    = kategori;
  el("hasil_rekomendasi_final").innerText = finalScore > 250 ? "DEVELOPMENT" : "ADMINISTRATION";

  renderPauliMiniChart(vals);
}

function renderPauliMiniChart(data) {
  const chart = el("chart_pauli_mini");
  if (!chart) return;
  chart.innerHTML = "";
  const max = Math.max(...data) || 1;
  data.forEach(v => {
    const bar = document.createElement("div");
    bar.style.cssText = `width:12px; height:${(v / max) * 100}%; background:linear-gradient(to top,#3b82f6,#60a5fa); border-radius:3px 3px 0 0;`;
    chart.appendChild(bar);
  });
}

function simpanPauli() {
  const lajur = Array.from({ length: 20 }, (_, i) => el("lajur_" + (i + 1)).value || 0);

  const payload = {
    id_test: el("id_test_pauli").value, id_peserta: el("idPeserta").value,
    nama: el("nama").value, tanggal: el("tgl_test").value, lajur,
    total_n: el("total_n").value, total_salah: el("total_salah").value,
    total_loncat: el("total_loncat").value, total_betul: el("total_betul").value,
    score_akhir: el("final_score_angka").value, persen_salah: el("score_salah_persen").value,
    puncak: el("score_puncak").value, terendah: el("score_terendah").value,
    simpangan: el("score_simpangan").value,
    kategori: el("hasil_kategori_final").innerText,
    rekomendasi: el("hasil_rekomendasi_final").innerText,
    analisa_full: el("analisa_keseluruhan").value,
    n_kapasitas:  el("narasi_kapasitas").value,
    n_ketelitian: el("narasi_ketelitian").value,
    n_stabilitas: el("narasi_stabilitas").value,
    n_kurva:      el("narasi_kurva").value
  };

  Swal.fire({ title: "Menyimpan...", allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  google.script.run
    .withSuccessHandler(msg => { Swal.fire("Tersimpan!", msg, "success"); })
    .withFailureHandler(err => { Swal.fire("Error", err.message, "error"); })
    .simpanKeSheetPauli(payload);
}
</script>
